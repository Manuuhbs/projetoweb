<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastrar Jogo</title>
  </head>
  <body>
    <h1>Cadastrar Jogo</h1>

    <label>Nome: <input type="text" id="nome" /></label><br /><br />
    <label>Genero: <input type="text" id="genero" /></label><br /><br />
    <label>Graficos: <input type="text" id="graficos" /></label><br /><br />
    <button id="btn">Cadastrar</button>

    <pre id="resposta"></pre>

    <script>
      const butao = document.getElementById("btn");
      butao.addEventListener("click", async function () {
        const name = document.getElementById("nome").value;
        const genero = document.getElementById("genero").value;
        const graficos = document.getElementById("graficos").value;

        const response = await fetch(
          "https://6a28adb74e1e783349a5e158.mockapi.io/api/jogos/jogo",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nome, genero, graficos }),
          },
        );

        const data = await response.json();
        document.getElementById("resposta").textContent = JSON.stringify(data);
      });
    </script>
  </body>
</html>
